# Nginx — split frontend / backend topology for avotoday.today-ww.net
#
# Frontend (Vite SPA):  static files from /var/www/avotoday-frontend/current/dist
# Backend  (Node API):  proxy /api/* to 127.0.0.1:4000 (loopback only — not publicly listenable)
#
# Replaces the older Option C config (deploy/nginx/avotoday-option-c.conf, deleted).
# Drop into /etc/nginx/sites-available/avotoday and symlink into sites-enabled.
# Replace TLS paths after certbot.

upstream avotoday_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# HTTP -> HTTPS redirect + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name avotoday.today-ww.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name avotoday.today-ww.net;

    # After certbot:
    # ssl_certificate     /etc/letsencrypt/live/avotoday.today-ww.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/avotoday.today-ww.net/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SPA static root — frontend deploy script atomically swaps the `current` symlink.
    root /var/www/avotoday-frontend/current/dist;
    index index.html;

    # Multer upload limit on the backend is ~25 MB worth; keep Nginx in line.
    client_max_body_size 25m;

    # Hide server version in error pages / 404s.
    server_tokens off;

    # API + webhooks -> Node backend on the loopback bind.
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_pass http://avotoday_backend;
    }

    # Hashed Vite assets (index-XYZ.js / index-XYZ.css / fonts / images) — long cache.
    # `try_files` ensures we never fall through to index.html for missing static assets.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|svg|png|jpe?g|webp|gif|ico|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA history fallback — every non-asset, non-/api GET serves index.html so
    # client-side routing (react-router) survives full-page reloads.
    location / {
        # index.html itself must NOT be long-cached, otherwise browsers hold onto a stale
        # bundle reference after a deploy.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Optional security headers (HSTS only after TLS is verified working):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

