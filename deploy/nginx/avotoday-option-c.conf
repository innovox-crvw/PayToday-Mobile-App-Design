# Nginx — Option C (unified Node): proxy all traffic to Express on 127.0.0.1:4000
# Include from http {} or place under sites-available and ensure `upstream` is not duplicated.
# Replace TLS paths after certbot.

upstream avotoday_node {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name avotoday.today-ww.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name avotoday.today-ww.net;

    # After certbot:
    # ssl_certificate     /etc/letsencrypt/live/avotoday.today-ww.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/avotoday.today-ww.net/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_pass http://avotoday_node;
    }
}
