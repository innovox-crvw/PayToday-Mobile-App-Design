  <!-- Left: circle + capsule -->
  <circle cx="11" cy="12" r="5.2" fill="#6E7F48"/>
  <rect x="7.4" y="20" width="7.2" height="16" rx="3.6" fill="#6E7F48"/>
  <!-- Middle: three maroon circles -->
  <circle cx="24" cy="11" r="5.2" fill="#7A2432"/>
  <circle cx="24" cy="24" r="5.2" fill="#7A2432"/>
  <circle cx="24" cy="37" r="5.2" fill="#7A2432"/>
  <!-- Right: two gold circles -->
  <circle cx="37" cy="12" r="5.2" fill="#C6A132"/>
  <circle cx="37" cy="25" r="5.2" fill="#C6A132"/>
