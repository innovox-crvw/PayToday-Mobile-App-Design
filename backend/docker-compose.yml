# Local SQL Server for PayToday Store backend (see docs/DEPLOY.md).
# Start: cd backend && docker compose up -d
# Connection string (sa password must match backend/.env): see backend/.env.example

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: paytoday-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'PayTodayDemo1!'
    ports:
      - '1433:1433'
    volumes:
      - paytoday_sql_data:/var/opt/mssql
    healthcheck:
      test: ['CMD-SHELL', '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P PayTodayDemo1! -Q "SELECT 1" -b || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

volumes:
  paytoday_sql_data:
